<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AprendeYa - Plataforma de clases particulares en línea">
  <title>AprendeYa - Iniciar Sesión</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container" style="max-width: 400px;">
    <h1 style="margin-top: 40px;">AprendeYa</h1>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 32px;">Plataforma de clases particulares en línea</p>
    
    <div class="card">
      <h2 style="margin-bottom: 24px;">Iniciar Sesión</h2>
      
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="tu@email.com" required>
      </div>
      
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      
      <button onclick="login()" style="margin-bottom: 16px;">Ingresar</button>
      
      <div id="error" class="error" style="display: none;"></div>
      
      <p style="text-align: center; margin-top: 24px;">
        ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
      </p>
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
