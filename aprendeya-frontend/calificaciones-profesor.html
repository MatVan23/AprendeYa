<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Calificaciones - AprendeYa</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container-wide">

  <h1>Mis Calificaciones</h1>
  <p style="text-align: center; margin-bottom: 28px;">Qué opinan tus estudiantes sobre ti</p>

  <div id="estadisticas" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px;">
    <div class="card" style="text-align: center;">
      <p style="font-size: 12px; color: var(--text-muted); text-transform: uppercase;">Calificación Promedio</p>
      <p style="font-size: 36px; font-weight: bold; color: var(--primary); margin: 12px 0;">⭐ <span id="promedio">--</span></p>
      <p style="font-size: 14px; color: var(--text-muted);">sobre 5.0</p>
    </div>
    <div class="card" style="text-align: center;">
      <p style="font-size: 12px; color: var(--text-muted); text-transform: uppercase;">Total de Calificaciones</p>
      <p style="font-size: 36px; font-weight: bold; color: var(--success); margin: 12px 0;" id="totalCalif">0</p>
      <p style="font-size: 14px; color: var(--text-muted);">Estudiantes</p>
    </div>
    <div class="card" style="text-align: center;">
      <p style="font-size: 12px; color: var(--text-muted); text-transform: uppercase;">Satisfacción</p>
      <div style="font-size: 36px; font-weight: bold; color: var(--warning); margin: 12px 0;" id="satisfaccion">--</div>
      <p style="font-size: 14px; color: var(--text-muted);">Desde calificaciones</p>
    </div>
  </div>

  <h2 style="margin-bottom: 20px;">📋 Todas las Calificaciones</h2>
  <div id="calificaciones" style="display: grid; gap: 16px;">
    <!-- Las calificaciones se cargarán aquí -->
  </div>

  <p style="text-align: center; margin-top: 32px;">
    <a href="dashboard-profesor.html">← Volver al Dashboard</a>
  </p>

</div>

<script src="calificaciones-profesor.js"></script>

</body>
</html>
