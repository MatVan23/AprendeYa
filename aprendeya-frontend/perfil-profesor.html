<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil - AprendeYa</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container" style="max-width: 700px; margin-top: 20px;">

  <h1>Mi Perfil de Profesor</h1>
  <p style="text-align: center; margin-bottom: 28px;">Actualiza tu información</p>

  <div class="card">
    <div class="form-group">
      <label for="materia">Materias que Enseñas</label>
      <input type="text" id="materia" placeholder="Ej: Matemáticas, Física, etc." required>
    </div>

    <div class="form-group">
      <label for="experiencia">Años de Experiencia</label>
      <input type="text" id="experiencia" placeholder="Ej: 5 años" required>
    </div>

    <div class="form-group">
      <label for="disponibilidad">Disponibilidad</label>
      <input type="text" id="disponibilidad" placeholder="Ej: Lunes a Viernes 3-9 PM" required>
    </div>

    <div class="form-group">
      <label for="descripcion">Descripción Personal</label>
      <input type="text" id="descripcion" placeholder="Tu descripción">
    </div>

    <button onclick="guardarPerfil()" class="btn-primary">💾 Guardar Cambios</button>
    <div id="mensaje" class="error" style="display: none;"></div>

    <p style="text-align: center; margin-top: 20px;">
      <a href="dashboard-profesor.html">← Volver al Dashboard</a>
    </p>
  </div>

</div>

<script src="perfil-profesor.js"></script>

</body>
</html>
