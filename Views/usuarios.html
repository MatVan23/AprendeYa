<link rel="stylesheet" href="styles.css">

<div class="table-container">
    <h2>👥 Gestión de Usuarios</h2>

    <div class="form-top">
        <input id="nombre" placeholder="Nombre">
        <input id="email" placeholder="Email">
        <input id="password" placeholder="Password">

        <button onclick="crear()">Guardar</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>
</div>

<script>
let editandoId = null;

function cargarUsuarios() {
    fetch("/usuarios")
    .then(res => res.json())
    .then(data => {
        tabla.innerHTML = "";
        data.forEach(u => {
            tabla.innerHTML += `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.nombre}</td>
                    <td>${u.email}</td>
                    <td>
                        <button class="btn-edit" onclick="editar(${u.id}, '${u.nombre}', '${u.email}', '${u.password}')">Editar</button>
                        <button class="btn-delete" onclick="eliminar(${u.id})">Eliminar</button>
                    </td>
                </tr>
            `;
        });
    });
}

function crear() {
    const metodo = editandoId ? "PUT" : "POST";
    const url = editandoId ? "/usuarios/" + editandoId : "/usuarios";

    fetch(url, {
        method: metodo,
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            nombre: nombre.value,
            email: email.value,
            password: password.value
        })
    })
    .then(() => {
        limpiar();
        cargarUsuarios();
        editandoId = null;
    });
}

function editar(id, nom, em, pass) {
    nombre.value = nom;
    email.value = em;
    password.value = pass;
    editandoId = id;
}

function eliminar(id) {
    fetch("/usuarios/" + id, {
        method: "DELETE"
    })
    .then(() => cargarUsuarios());
}

function limpiar() {
    nombre.value = "";
    email.value = "";
    password.value = "";
}

cargarUsuarios();
</script>
