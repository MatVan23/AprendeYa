<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Estudiante</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container-wide">
    <h1>Mi Dashboard</h1>
    <p style="text-align: center; margin-bottom: 32px;">Bienvenido a AprendeYa</p>
    
    <div class="menu-grid">
      <div class="menu-card">
        <a href="buscar-profesores.html">
          <span class="menu-card-icon">🔍</span>
          <span class="menu-card-title">Buscar Clases</span>
          <span style="font-size: 12px; color: var(--text-muted);">Explora profesores</span>
        </a>
      </div>
      <div class="menu-card">
        <a href="mis-clases-estudiante.html">
          <span class="menu-card-icon">📚</span>
          <span class="menu-card-title">Mis Clases</span>
          <span style="font-size: 12px; color: var(--text-muted);">Tus reservas</span>
        </a>
      </div>
      <div class="menu-card">
        <a href="pagos.html">
          <span class="menu-card-icon">💳</span>
          <span class="menu-card-title">Pagos</span>
          <span style="font-size: 12px; color: var(--text-muted);">QRs de pago</span>
        </a>
      </div>
      <div class="menu-card">
        <a href="calificaciones.html">
          <span class="menu-card-icon">⭐</span>
          <span class="menu-card-title">Calificaciones</span>
          <span style="font-size: 12px; color: var(--text-muted);">Evalúa profesores</span>
        </a>
      </div>
    </div>
    
    <p style="text-align: center; margin-top: 40px;">
      <button class="btn-secondary" onclick="logout()">Cerrar Sesión</button>
    </p>
  </div>
  <script>
    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
