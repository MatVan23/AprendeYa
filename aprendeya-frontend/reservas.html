<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmar Reserva - AprendeYa</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container" style="max-width: 500px; margin-top: 40px;">

  <h1>Confirmar Reserva</h1>

  <div class="card">
    <div style="text-align: center;">
      <p style="font-size: 16px; margin-bottom: 24px;">¿Deseas reservar esta clase?</p>
      <div id="classeDetails" style="background: rgba(99, 102, 241, 0.1); padding: 16px; border-radius: 8px; margin-bottom: 24px; text-align: left;">
        <p><strong>Cargando detalles...</strong></p>
      </div>
    </div>
    
    <div class="btn-group">
      <button onclick="reservarClase()" class="btn-success">✓ Confirmar Reserva</button>
      <button class="btn-secondary" onclick="cancelarReserva()">✕ Cancelar</button>
    </div>
  </div>

</div>

<script src="reservas.js"></script>

</body>
</html>
