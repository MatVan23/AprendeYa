<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Pagos - AprendeYa</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container-wide">

  <h1>Códigos QR de Pago</h1>
  <p style="text-align: center; margin-bottom: 28px;">Administra tus códigos QR para cobros</p>

<div class="card">
    <h2 style="margin-bottom: 20px;">📤 Subir Nuevo Código QR</h2>
    <div id="formQR">
      <div class="form-group">
        <label for="reservaId">Selecciona una Clase</label>
        <select id="reservaId" onchange="autocompletarMonto()" required>
          <option value="">-- Selecciona una clase --</option>
        </select>
      </div>

      <div class="form-group">
        <label for="monto">Monto en Bs</label>
        <input type="number" id="monto" placeholder="Se completa automáticamente" step="0.01" min="0" readonly>
      </div>

      <div class="form-group">
        <label for="qrImagen">Imagen del QR</label>
        <input type="file" id="qrImagen" accept="image/*" required>
      </div>

      <button type="button" onclick="subirQR()" class="btn-success">📸 Subir Código QR</button>
      <div id="mensajeQR" class="error" style="display: none; margin-top: 12px;"></div>
    </div>
  </div>

  <h2 style="margin-top: 32px; margin-bottom: 20px;">📋 Mis QRs Registrados</h2>
  <div class="table-responsive">
    <table id="tablaQRs">
      <thead>
        <tr>
          <th>ID</th>
          <th>Estudiante</th>
          <th>Materia</th>
          <th>Monto</th>
          <th>Pagado</th>
          <th>QR</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
  </div>

  <p style="text-align: center; margin-top: 32px;">
    <a href="dashboard-profesor.html">← Volver al Dashboard</a>
  </p>

</div>

<script src="mis-pagos-profesor.js"></script>

</body>
</html>
